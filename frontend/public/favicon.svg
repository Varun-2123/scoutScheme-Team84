<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b2bdb"></stop>
      <stop offset="100%" stop-color="#8b5cf6"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#grad)"></rect>

  <!-- Compass circle -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="white" stroke-width="2"></circle>

  <!-- Compass needle -->
  <polygon points="32,20 36,36 32,32 28,36" fill="white"></polygon>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="white"></circle>
</svg>